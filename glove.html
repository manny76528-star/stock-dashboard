<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚾ Glove Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sidebar:240px;
  --bg:#f8f9fa;
  --white:#ffffff;
  --border:#eaecf0;
  --text:#1e293b;
  --muted:#9ca3af;
  --accent:#2563eb;
  --gain:#dc2626;
  --loss:#16a34a;
  --mono:'JetBrains Mono',monospace;
  --radius:14px;
  --shadow:0 2px 8px rgba(0,0,0,.05);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  display:flex;
  min-height:100vh;
}

/* ══ SIDEBAR ══ */
.g-sidebar{
  width:var(--sidebar);
  min-height:100vh;
  background:var(--white);
  border-right:1px solid var(--border);
  box-shadow:2px 0 12px rgba(0,0,0,.04);
  position:fixed;top:0;left:0;
  display:flex;flex-direction:column;
  z-index:200;
}
.g-sidebar-brand{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.g-sidebar-icon{font-size:24px;}
.g-sidebar-title{font-size:15px;font-weight:800;color:var(--text);}
.g-sidebar-sub{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:.5px;}
.g-nav{flex:1;padding:12px 0;overflow-y:auto;}
.g-nav-section{font-size:10px;font-weight:700;color:#8e92bc;padding:14px 0 6px 14px;letter-spacing:1px;text-transform:uppercase;}
.g-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  font-size:13px;font-weight:600;color:#64748b;
  cursor:pointer;transition:all .15s;
  border-left:3px solid transparent;
  user-select:none;margin-bottom:2px;
}
.g-nav-item:hover{background:#f8fafc;color:var(--accent);}
.g-nav-item.active{background:#eff6ff;color:var(--accent);border-left-color:var(--accent);font-weight:700;}
.g-nav-icon{font-size:15px;width:20px;text-align:center;}
.g-sidebar-footer{
  padding:14px 16px;
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;
}
.g-sidebar-btn{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--white);
  color:var(--text);
  font-size:12px;font-weight:700;
  cursor:pointer;width:100%;text-align:left;
  transition:background .15s;
}
.g-sidebar-btn:hover{background:#f8fafc;}
.g-sidebar-btn.primary{background:#2563eb;color:#fff;border-color:#2563eb;}
.g-sidebar-btn.primary:hover{background:#1d4ed8;}

/* ══ MAIN ══ */
.g-main{
  margin-left:var(--sidebar);
  flex:1;min-width:0;
  height:100vh;overflow-y:auto;
}
.g-topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(248,249,250,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
.g-topbar-title{font-size:15px;font-weight:800;color:var(--text);}
.g-topbar-actions{display:flex;gap:8px;align-items:center;}
.g-content{padding:24px 28px;}

/* ══ KPI CARDS ══ */
.g-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.g-kpi-card{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--border);padding:18px 20px;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.g-kpi-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:2px;}
.g-kpi-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;padding-left:8px;margin-bottom:6px;}
.g-kpi-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--text);padding-left:8px;}
.g-kpi-sub{font-size:11px;color:var(--muted);padding-left:8px;margin-top:4px;}

/* ══ CHART ROW ══ */
.g-mid-grid{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:20px;}
.g-chart-card{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--border);padding:20px;
  box-shadow:var(--shadow);
}
.g-chart-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:16px;}

/* ══ SECTION HEADER ══ */
.g-section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.g-section-title{font-size:14px;font-weight:800;color:var(--text);}

/* ══ GLOVE GALLERY ══ */
.g-gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}
.g-card{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow:hidden;cursor:pointer;
  transition:box-shadow .2s,transform .2s;
}
.g-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);}
.g-card-img{
  width:100%;height:180px;object-fit:cover;
  background:#f8f9fa;
  display:flex;align-items:center;justify-content:center;
}
.g-card-img img{width:100%;height:180px;object-fit:cover;}
.g-card-placeholder{
  width:100%;height:180px;background:#f1f5f9;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);
}
.g-card-body{padding:14px 16px;}
.g-card-brand{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.g-card-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.g-card-meta{font-size:11px;color:var(--muted);margin-bottom:8px;}
.g-badge{
  display:inline-block;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:5px;
}
.g-badge-hold{background:#dcfce7;color:#15803d;}
.g-badge-sold{background:#fee2e2;color:#b91c1c;}
.g-badge-wish{background:#dbeafe;color:#1d4ed8;}
.g-card-price{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;padding-top:8px;border-top:1px solid #f0f2f5;
}
.g-card-pnl{font-size:12px;font-weight:700;font-family:var(--mono);}
.g-card-stars{font-size:12px;}

/* ══ DRAWER ══ */
.g-drawer{
  position:fixed;top:0;right:0;height:100vh;
  width:580px;max-width:92vw;
  background:var(--white);
  box-shadow:-8px 0 40px rgba(0,0,0,.12);
  z-index:3000;display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.g-drawer.open{transform:translateX(0);}
.g-drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.3);
  z-index:2999;opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
.g-drawer-overlay.open{opacity:1;pointer-events:all;}
.g-drawer-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.g-drawer-title{font-size:16px;font-weight:800;color:var(--text);}
.g-drawer-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
.g-drawer-body{flex:1;overflow-y:auto;padding:20px 24px;}

/* Form fields */
.g-label{font-size:11px;font-weight:600;color:#374151;margin-bottom:4px;display:block;}
.g-input{
  width:100%;padding:8px 12px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;outline:none;
  font-family:'Noto Sans TC',sans-serif;
  transition:border-color .15s;box-sizing:border-box;
  background:var(--white);color:var(--text);
}
.g-input:focus{border-color:var(--accent);}
.g-textarea{
  width:100%;padding:8px 12px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;outline:none;resize:vertical;min-height:70px;
  font-family:'Noto Sans TC',sans-serif;transition:border-color .15s;box-sizing:border-box;
}
.g-textarea:focus{border-color:var(--accent);}
.g-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g-section-divider{margin:16px 0 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.g-save-btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#1e3a5f,#2563eb);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  margin-top:16px;
}
.g-save-btn:hover{opacity:.9;}

/* ══ DETAIL DRAWER ══ */
.g-detail-img{width:100%;border-radius:10px;object-fit:cover;max-height:280px;}
.g-detail-section{margin-bottom:16px;}
.g-detail-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:4px;}
.g-detail-val{font-size:14px;font-weight:600;color:var(--text);}
.g-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g-img-gallery{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.g-img-thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;cursor:zoom-in;border:1.5px solid var(--border);}

/* ══ WISHLIST / SOLD LIST ══ */
.g-list-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid #f5f5f5;
  cursor:pointer;transition:background .12s;
}
.g-list-row:last-child{border-bottom:none;}
.g-list-row:hover{background:#fafbff;margin:0 -4px;padding:12px 4px;}
.g-list-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f1f5f9;}
.g-list-brand{font-size:10px;font-weight:700;color:var(--accent);}
.g-list-name{font-size:13px;font-weight:700;color:var(--text);}
.g-list-meta{font-size:11px;color:var(--muted);}

/* ══ RECENT LIST ══ */
.g-recent-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid #f5f5f5;
}
.g-recent-item:last-child{border-bottom:none;}
.g-recent-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;background:#f1f5f9;flex-shrink:0;}
.g-recent-name{font-size:12px;font-weight:700;color:var(--text);}
.g-recent-date{font-size:10px;color:var(--muted);}

/* ══ STAR RATING ══ */
.g-stars{display:flex;gap:4px;cursor:pointer;font-size:20px;}
.g-star{color:#e2e8f0;transition:color .15s;}
.g-star.on{color:#f59e0b;}

/* ══ TOAST ══ */
.g-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(17,24,39,.92);color:#fff;
  padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;
  opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;
}
.g-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#lightbox{display:none;}
#lightbox.open{display:flex !important;}

/* ══ IMG UPLOAD ══ */
.g-img-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.g-img-preview-item{position:relative;}
.g-img-preview-img{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);}
.g-img-del{
  position:absolute;top:-4px;right:-4px;
  background:#dc2626;color:#fff;border:none;
  border-radius:50%;width:18px;height:18px;
  font-size:10px;cursor:pointer;
}

/* ══ PAGES ══ */
.g-page{display:none;}
.g-page.active{display:block;}

@media(max-width:768px){
  .g-sidebar{width:200px;}
  .g-main{margin-left:200px;}
  .g-kpi-grid{grid-template-columns:repeat(2,1fr);}
  .g-mid-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<div class="g-sidebar">
  <div class="g-sidebar-brand">
    <div class="g-sidebar-icon">🧤</div>
    <div>
      <div class="g-sidebar-title">Glove Vault</div>
      <div class="g-sidebar-sub">棒球手套收藏記錄</div>
    </div>
  </div>
  <nav class="g-nav">
    <div class="g-nav-section">主要</div>
    <div class="g-nav-item active" id="gnav-dashboard" onclick="gShowPage('dashboard')">
      <span class="g-nav-icon">📊</span>收藏總覽
    </div>
    <div class="g-nav-section">收藏</div>
    <div class="g-nav-item" id="gnav-hold" onclick="gShowPage('hold')">
      <span class="g-nav-icon">⚾</span>持有中手套
    </div>
    <div class="g-nav-item" id="gnav-sold" onclick="gShowPage('sold')">
      <span class="g-nav-icon">🤝</span>已售出紀錄
    </div>
    <div class="g-nav-item" id="gnav-wish" onclick="gShowPage('wish')">
      <span class="g-nav-icon">👁</span>觀察中清單
    </div>
    <div class="g-nav-section">記錄</div>
    <div class="g-nav-item" id="gnav-gallery" onclick="gShowPage('gallery')">
      <span class="g-nav-icon">🖼</span>手套畫廊
    </div>
  </nav>
  <div class="g-sidebar-footer">
    <button class="g-sidebar-btn primary" onclick="openAddDrawer()">＋ 新增手套</button>
    <button class="g-sidebar-btn" onclick="manualSync()">☁️ 雲端同步</button>
    <a href="index.html" class="g-sidebar-btn" style="text-decoration:none;display:block;text-align:left">🏠 主目錄</a>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div class="g-main">
  <div class="g-topbar">
    <div class="g-topbar-title" id="g-page-name">收藏總覽</div>
    <div class="g-topbar-actions">
      <div id="g-sync-status" style="font-size:12px;color:var(--muted)"></div>
      <button style="padding:7px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer" onclick="openAddDrawer()">＋ 新增手套</button>
    </div>
  </div>

  <div class="g-content">

    <!-- ══ PAGE: DASHBOARD ══ -->
    <div class="g-page active" id="gpage-dashboard">
      <!-- KPI -->
      <div class="g-kpi-grid">
        <div class="g-kpi-card">
          <div class="g-kpi-accent" style="background:#8fa8c8"></div>
          <div class="g-kpi-label">收藏總隻數</div>
          <div class="g-kpi-val" id="kpi-total">0</div>
          <div class="g-kpi-sub" id="kpi-total-sub"></div>
        </div>
        <div class="g-kpi-card">
          <div class="g-kpi-accent" style="background:#a8c5a0"></div>
          <div class="g-kpi-label">持有中</div>
          <div class="g-kpi-val" id="kpi-hold">0</div>
          <div class="g-kpi-sub" id="kpi-hold-sub"></div>
        </div>
        <div class="g-kpi-card">
          <div class="g-kpi-accent" style="background:#c9a99a"></div>
          <div class="g-kpi-label">投入總資本</div>
          <div class="g-kpi-val" id="kpi-invested">$0</div>
          <div class="g-kpi-sub" id="kpi-invested-sub"></div>
        </div>
        <div class="g-kpi-card">
          <div class="g-kpi-accent" style="background:#b5adc4"></div>
          <div class="g-kpi-label">損益</div>
          <div class="g-kpi-val" id="kpi-pnl">$0</div>
          <div class="g-kpi-sub" id="kpi-pnl-sub"></div>
        </div>
      </div>

      <!-- 圖表 + 最新動態 -->
      <div class="g-mid-grid">
        <div class="g-chart-card">
          <div class="g-chart-title">🥧 品牌分佈</div>
          <div style="position:relative;height:220px">
            <canvas id="brand-donut"></canvas>
          </div>
          <div id="brand-legend" style="margin-top:14px;display:flex;flex-direction:column;gap:6px"></div>
        </div>
        <div class="g-chart-card">
          <div class="g-chart-title">🆕 最新入庫</div>
          <div id="recent-list"></div>
        </div>
      </div>

      <!-- 畫廊預覽 -->
      <div class="g-section-hdr">
        <div class="g-section-title">🖼 收藏畫廊</div>
        <button onclick="gShowPage('gallery')" style="font-size:12px;color:var(--accent);font-weight:700;background:none;border:none;cursor:pointer">查看全部 ↗</button>
      </div>
      <div class="g-gallery" id="dash-gallery"></div>
    </div>

    <!-- ══ PAGE: HOLD ══ -->
    <div class="g-page" id="gpage-hold">
      <div class="g-section-hdr">
        <div class="g-section-title">⚾ 持有中手套</div>
        <span id="hold-count" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div class="g-gallery" id="hold-gallery"></div>
    </div>

    <!-- ══ PAGE: SOLD ══ -->
    <div class="g-page" id="gpage-sold">
      <div class="g-section-hdr">
        <div class="g-section-title">🤝 已售出紀錄</div>
        <span id="sold-count" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div class="g-gallery" id="sold-gallery"></div>
    </div>

    <!-- ══ PAGE: WISH ══ -->
    <div class="g-page" id="gpage-wish">
      <div class="g-section-hdr">
        <div class="g-section-title">👁 觀察中清單</div>
      </div>
      <div style="color:var(--muted);font-size:13px;padding:40px;text-align:center;background:var(--white);border-radius:var(--radius)">
        觀察清單功能開發中，目前可在手套編輯時標注「備註」作為觀察記錄
      </div>
    </div>

    <!-- ══ PAGE: GALLERY ══ -->
    <div class="g-page" id="gpage-gallery">
      <div class="g-section-hdr">
        <div class="g-section-title">🖼 手套畫廊</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="text" placeholder="🔍 搜尋..." id="g-search"
            style="padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;outline:none;width:140px"
            oninput="renderAllPages()">
          <button id="g-filter-all" onclick="gSetFilter('all',this)" style="padding:6px 12px;background:#2563eb;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">全部</button>
          <button id="g-filter-hold" onclick="gSetFilter('hold',this)" style="padding:6px 12px;background:#f8f9fa;border:1px solid var(--border);color:#374151;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">持有中</button>
          <button id="g-filter-sold" onclick="gSetFilter('sold',this)" style="padding:6px 12px;background:#f8f9fa;border:1px solid var(--border);color:#374151;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">已售出</button>
          <button id="g-sort-star" onclick="gToggleStarSort()" style="padding:6px 12px;background:#f8f9fa;border:1px solid var(--border);color:#374151;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">⭐ 評分排序</button>
        </div>
      </div>
      <div class="g-gallery" id="all-gallery"></div>
    </div>

  </div>
</div>

<!-- ══ DRAWER OVERLAY ══ -->
<div id="g-drawer-overlay" class="g-drawer-overlay" onclick="closeGDrawer()"></div>

<!-- ══ 新增/編輯 DRAWER ══ -->
<div id="g-edit-drawer" class="g-drawer">
  <div class="g-drawer-hdr">
    <div class="g-drawer-title" id="g-drawer-title">新增手套</div>
    <div style="display:flex;gap:8px">
      <button onclick="saveGlove()" style="padding:7px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">💾 儲存</button>
      <button class="g-drawer-close" onclick="closeGDrawer()">✕</button>
    </div>
  </div>
  <div class="g-drawer-body">
    <div class="g-section-divider">基本資料</div>
    <div class="g-grid2" style="margin-bottom:12px">
      <div><span class="g-label">品牌</span><input class="g-input" id="g-brand" placeholder="Rawlings、Wilson..."></div>
      <div><span class="g-label">型號</span><input class="g-input" id="g-model" placeholder="Heart of the Hide..."></div>
    </div>
    <div class="g-grid2" style="margin-bottom:12px">
      <div><span class="g-label">守備位置</span>
        <select class="g-input" id="g-position">
          <option value="">— 選擇 —</option>
          <option>投手</option><option>捕手</option><option>一壘手</option>
          <option>二壘手</option><option>三壘手</option><option>游擊手</option>
          <option>外野手</option><option>全壘打比賽</option>
        </select>
      </div>
      <div><span class="g-label">尺寸</span><input class="g-input" id="g-size" placeholder="11.5\""></div>
    </div>

    <div class="g-section-divider">交易資訊</div>
    <div class="g-grid2" style="margin-bottom:12px">
      <div><span class="g-label">買入日期</span><input class="g-input" type="date" id="g-buy-date"></div>
      <div><span class="g-label">買入價格</span><input class="g-input" type="number" id="g-buy-price" placeholder="0"></div>
    </div>
    <div class="g-grid2" style="margin-bottom:12px">
      <div><span class="g-label">賣出日期（已售則填）</span><input class="g-input" type="date" id="g-sell-date"></div>
      <div><span class="g-label">賣出價格</span><input class="g-input" type="number" id="g-sell-price" placeholder="尚未賣出留空"></div>
    </div>

    <div class="g-section-divider">評分與評價</div>
    <div style="margin-bottom:12px">
      <span class="g-label">評分</span>
      <div class="g-stars" id="g-stars-row">
        <span class="g-star" onclick="setModalStar(1)">★</span>
        <span class="g-star" onclick="setModalStar(2)">★</span>
        <span class="g-star" onclick="setModalStar(3)">★</span>
        <span class="g-star" onclick="setModalStar(4)">★</span>
        <span class="g-star" onclick="setModalStar(5)">★</span>
      </div>
    </div>
    <div class="g-grid2" style="margin-bottom:12px">
      <div><span class="g-label">優點</span><textarea class="g-textarea" id="g-pros" placeholder="手感、皮革..."></textarea></div>
      <div><span class="g-label">缺點</span><textarea class="g-textarea" id="g-cons" placeholder="需改進之處..."></textarea></div>
    </div>
    <div style="margin-bottom:12px">
      <span class="g-label">備註</span>
      <textarea class="g-textarea" id="g-note" placeholder="其他記錄..."></textarea>
    </div>

    <div class="g-section-divider">附圖</div>
    <div class="g-img-preview" id="g-img-preview"></div>
    <label style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#f8f9fa;border:1.5px dashed #d1d5db;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#374151">
      📎 上傳圖片
      <input type="file" id="g-img-input" accept="image/*" multiple style="display:none" onchange="handleGImgUpload(event)">
    </label>

    <button onclick="saveGlove()" class="g-save-btn">💾 儲存手套</button>
    <div id="g-del-wrap" style="display:none;margin-top:10px">
      <button onclick="deleteGlove()" style="width:100%;padding:10px;background:#fff;border:1.5px solid #fca5a5;color:#dc2626;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">🗑 刪除此手套</button>
    </div>
    <div style="height:20px"></div>
  </div>
</div>

<!-- ══ 詳情 DRAWER ══ -->
<div id="g-detail-drawer" class="g-drawer">
  <div class="g-drawer-hdr">
    <div class="g-drawer-title" id="g-detail-title">手套詳情</div>
    <div style="display:flex;gap:8px">
      <button id="g-detail-edit-btn" onclick="editFromDetail()" style="padding:7px 14px;background:#f8f9fa;border:1px solid var(--border);color:#374151;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">✏️ 編輯</button>
      <button class="g-drawer-close" onclick="closeGDrawer()">✕</button>
    </div>
  </div>
  <div class="g-drawer-body" id="g-detail-body"></div>
</div>

<div class="g-toast" id="g-toast"></div>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;align-items:center;justify-content:center;flex-direction:column">
  <button onclick="closeLightbox()" style="position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:1">✕</button>
  <button onclick="lbPrev()" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;cursor:pointer;padding:10px 14px;border-radius:10px">‹</button>
  <img id="lb-img" style="max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px">
  <div id="lb-counter" style="color:#fff;font-size:13px;margin-top:12px;font-family:'JetBrains Mono',monospace"></div>
  <button onclick="lbNext()" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;cursor:pointer;padding:10px 14px;border-radius:10px">›</button>
</div>

<script>
// ══════════════════════════
// DATA
// ══════════════════════════

// ══════════════════════════════════════
// 新版 UI 函式
// ══════════════════════════════════════
const MORANDI=['#8fa8c8','#a8c5a0','#c9a99a','#b5adc4','#c4b89a','#9bbfbf','#d4a9b5','#a3b5a3'];
let _brandChart=null;
let _currentFilter='all';
let _currentDrawer=null;

function gShowPage(id){
  document.querySelectorAll('.g-page').forEach(p=>p.classList.remove('active'));
  const page=document.getElementById('gpage-'+id);
  if(page)page.classList.add('active');
  document.querySelectorAll('.g-nav-item').forEach(el=>{
    el.classList.toggle('active', el.id==='gnav-'+id);
  });
  const names={dashboard:'收藏總覽',hold:'持有中手套',sold:'已售出紀錄',wish:'觀察中清單',gallery:'手套畫廊'};
  const titleEl=document.getElementById('g-page-name');
  if(titleEl)titleEl.textContent=names[id]||id;
  const mainEl=document.querySelector('.g-main');
  if(mainEl)mainEl.scrollTo({top:0,behavior:'smooth'});
  renderAllPages();
}

let _starSort=0; // 0=日期新到舊 1=星星高到低 2=星星低到高

function gToggleStarSort(){
  _starSort=(_starSort+1)%3;
  const btn=document.getElementById('g-sort-star');
  if(btn){
    if(_starSort===0){btn.textContent='⭐ 評分排序';btn.style.background='#f8f9fa';btn.style.color='#374151';btn.style.borderColor='var(--border)';}
    else if(_starSort===1){btn.textContent='⭐ 高→低';btn.style.background='#fef3c7';btn.style.color='#92400e';btn.style.borderColor='#f59e0b';}
    else{btn.textContent='⭐ 低→高';btn.style.background='#fef3c7';btn.style.color='#92400e';btn.style.borderColor='#f59e0b';}
  }
  renderAllPages();
}

function gSortList(list){
  if(_starSort===1) return list.sort((a,b)=>(b.stars||0)-(a.stars||0));
  if(_starSort===2) return list.sort((a,b)=>(a.stars||0)-(b.stars||0));
  // 預設：買入日期新到舊
  return list.sort((a,b)=>(b.buyDate||'').localeCompare(a.buyDate||''));
}

function gSetFilter(filter, btn){
  _currentFilter=filter;
  document.querySelectorAll('[id^="g-filter-"]').forEach(b=>{
    b.style.background='#f8f9fa';b.style.color='#374151';b.style.borderColor='var(--border)';
  });
  if(btn){btn.style.background='#2563eb';btn.style.color='#fff';btn.style.borderColor='#2563eb';}
  renderAllPages();
}

function renderAllPages(){
  renderKpi();
  renderBrandChart();
  renderRecentList();
  // Dashboard 預覽：最新8隻
  const dashList=gSortList([...db.gloves]).slice(0,8);
  renderGalleryPage('dash-gallery', dashList);
  renderGalleryPage('hold-gallery', gSortList(db.gloves.filter(g=>!g.sellDate||!g.sellPrice)));
  renderGalleryPage('sold-gallery', gSortList(db.gloves.filter(g=>g.sellDate&&g.sellPrice)));
  const el=document.getElementById('hold-count');
  if(el)el.textContent=db.gloves.filter(g=>!g.sellDate||!g.sellPrice).length+' 隻';
  const sel=document.getElementById('sold-count');
  if(sel)sel.textContent=db.gloves.filter(g=>g.sellDate&&g.sellPrice).length+' 隻';
  // 畫廊頁篩選+排序
  const q=(document.getElementById('g-search')?.value||'').toLowerCase();
  let list=[...db.gloves];
  if(_currentFilter==='hold')list=list.filter(g=>!g.sellDate||!g.sellPrice);
  if(_currentFilter==='sold')list=list.filter(g=>g.sellDate&&g.sellPrice);
  if(q)list=list.filter(g=>(g.brand||'').toLowerCase().includes(q)||(g.model||'').toLowerCase().includes(q)||(g.note||'').toLowerCase().includes(q));
  renderGalleryPage('all-gallery', gSortList(list));
}

function renderKpi(){
  const all=db.gloves;
  const hold=all.filter(g=>!g.sellDate||!g.sellPrice);
  const sold=all.filter(g=>g.sellDate&&g.sellPrice);
  const invested=all.reduce((s,g)=>s+(+g.buyPrice||0),0);
  const returned=sold.reduce((s,g)=>s+(+g.sellPrice||0),0);
  const pnl=returned-sold.reduce((s,g)=>s+(+g.buyPrice||0),0);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('kpi-total',all.length);
  set('kpi-total-sub','已售 '+sold.length+' 隻');
  set('kpi-hold',hold.length);
  set('kpi-hold-sub','佔 '+Math.round(hold.length/Math.max(all.length,1)*100)+'%');
  set('kpi-invested','$'+invested.toLocaleString());
  set('kpi-invested-sub','均價 $'+Math.round(invested/Math.max(all.length,1)).toLocaleString());
  const pnlEl=document.getElementById('kpi-pnl');
  if(pnlEl){pnlEl.textContent=(pnl>=0?'+':'')+'$'+Math.abs(pnl).toLocaleString();pnlEl.style.color=pnl>=0?'#dc2626':'#16a34a';}
  set('kpi-pnl-sub','已售損益');
}

function renderBrandChart(){
  const canvas=document.getElementById('brand-donut');
  const legendEl=document.getElementById('brand-legend');
  if(!canvas||!legendEl)return;
  const brandMap={};
  db.gloves.forEach(g=>{if(g.brand){brandMap[g.brand]=(brandMap[g.brand]||0)+1;}});
  const entries=Object.entries(brandMap).sort((a,b)=>b[1]-a[1]);
  if(entries.length===0)return;
  const labels=entries.map(e=>e[0]);
  const data=entries.map(e=>e[1]);
  const colors=entries.map((_,i)=>MORANDI[i%MORANDI.length]);
  const total=data.reduce((a,b)=>a+b,0);
  if(_brandChart)_brandChart.destroy();
  _brandChart=new Chart(canvas,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:3,borderColor:'#fff',hoverOffset:5}]},
    options:{
      cutout:'68%',responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(17,24,39,.88)',
          bodyFont:{family:"'JetBrains Mono',monospace",size:11},
          padding:8,cornerRadius:8,
          callbacks:{label(ctx){const v=ctx.parsed;return ' '+v+' 隻 ('+Math.round(v/total*100)+'%)';}}
        }
      }
    }
  });
  legendEl.innerHTML=entries.map((e,i)=>`
    <div style="display:flex;align-items:center;gap:8px">
      <span style="width:8px;height:8px;border-radius:50%;background:${colors[i]};flex-shrink:0"></span>
      <span style="font-size:12px;font-weight:700;color:#374151;flex:1">${e[0]}</span>
      <span style="font-size:11px;color:#9ca3af;font-family:'JetBrains Mono',monospace">${e[1]}隻 · ${Math.round(e[1]/total*100)}%</span>
    </div>`).join('');
}

function renderRecentList(){
  const el=document.getElementById('recent-list');
  if(!el)return;
  const recent=[...db.gloves].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'' )).slice(0,5);
  if(recent.length===0){el.innerHTML='<div style="color:#9ca3af;text-align:center;padding:20px;font-size:13px">尚無收藏</div>';return;}
  el.innerHTML=recent.map(g=>{
    const sold=g.sellDate&&g.sellPrice;
    const img=g.images?.[0];
    return`<div class="g-recent-item" onclick="openGDetail('${g.id}')" style="cursor:pointer">
      ${img?`<img src="${img}" class="g-recent-thumb">`:`<div class="g-recent-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">🧤</div>`}
      <div style="flex:1;min-width:0">
        <div class="g-recent-name">${g.brand||'—'} ${g.model||''}</div>
        <div class="g-recent-date">${g.buyDate||''} · <span class="${sold?'g-badge g-badge-sold':'g-badge g-badge-hold'}">${sold?'已售出':'持有中'}</span></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:#374151">$${(+g.buyPrice||0).toLocaleString()}</div>
    </div>`;
  }).join('');
}

function renderGalleryPage(containerId, list){
  const el=document.getElementById(containerId);
  if(!el)return;
  if(list.length===0){
    el.innerHTML='<div style="color:#9ca3af;text-align:center;padding:40px;grid-column:1/-1;font-size:13px">尚無收藏</div>';
    return;
  }
  el.innerHTML=list.map(g=>{
    const sold=g.sellDate&&g.sellPrice;
    const pnl=sold?(+g.sellPrice)-(+g.buyPrice):null;
    const img=g.images?.[0];
    const stars=g.stars?'★'.repeat(g.stars)+'☆'.repeat(5-g.stars):'';
    return`<div class="g-card" onclick="openGDetail('${g.id}')">
      ${img
        ?`<div class="g-card-img"><img src="${img}" alt="${g.brand}"></div>`
        :`<div class="g-card-placeholder"><span style="font-size:36px">🧤</span><span style="font-size:11px;margin-top:4px">NO PHOTO</span></div>`}
      <div class="g-card-body">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div class="g-card-brand">${g.brand||'—'}</div>
          <span class="g-badge ${sold?'g-badge-sold':'g-badge-hold'}">${sold?'已售出':'持有中'}</span>
        </div>
        <div class="g-card-name">${g.model||'未命名'}</div>
        <div class="g-card-meta">${g.position||''} ${g.size?'· '+g.size:''} ${g.buyDate?'· '+g.buyDate:''}</div>
        <div class="g-card-price">
          <div style="font-size:12px;color:#9ca3af">買入 <span style="font-weight:700;color:#374151;font-family:'JetBrains Mono',monospace">$${(+g.buyPrice||0).toLocaleString()}</span></div>
          ${pnl!=null?`<div class="g-card-pnl" style="color:${pnl>=0?'#dc2626':'#16a34a'}">${pnl>=0?'+':''} $${Math.abs(pnl).toLocaleString()}</div>`:''}
        </div>
        ${stars?`<div class="g-card-stars" style="color:#f59e0b;margin-top:4px">${stars}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ══ DRAWER ══
function openGDrawer(id){
  if(_currentDrawer)closeGDrawer();
  const drawer=document.getElementById(id);
  const overlay=document.getElementById('g-drawer-overlay');
  if(!drawer)return;
  drawer.classList.add('open');
  if(overlay)overlay.classList.add('open');
  _currentDrawer=id;
  document.body.style.overflow='hidden';
}
function closeGDrawer(){
  if(!_currentDrawer)return;
  const drawer=document.getElementById(_currentDrawer);
  const overlay=document.getElementById('g-drawer-overlay');
  if(drawer)drawer.classList.remove('open');
  if(overlay)overlay.classList.remove('open');
  _currentDrawer=null;
  document.body.style.overflow='';
}

// ══ ADD/EDIT ══
function openAddDrawer(){
  editId=null;
  _modalStars=0;
  currentImgs=[];
  const title=document.getElementById('g-drawer-title');
  if(title)title.textContent='新增手套';
  ['g-brand','g-model','g-size','g-pros','g-cons','g-note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['g-position'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('g-buy-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('g-buy-price').value='';
  document.getElementById('g-sell-date').value='';
  document.getElementById('g-sell-price').value='';
  document.querySelectorAll('#g-stars-row .g-star').forEach(s=>s.classList.remove('on'));
  const preview=document.getElementById('g-img-preview');if(preview)preview.innerHTML='';
  const delWrap=document.getElementById('g-del-wrap');if(delWrap)delWrap.style.display='none';
  openGDrawer('g-edit-drawer');
}

function openEditDrawer(id){
  const g=db.gloves.find(x=>x.id===id);if(!g)return;
  editId=id;
  _modalStars=g.stars||0;
  currentImgs=[...(g.images||[])];
  const title=document.getElementById('g-drawer-title');
  if(title)title.textContent='編輯手套';
  const sv=(elId,val)=>{const el=document.getElementById(elId);if(el)el.value=val||'';}
  sv('g-brand',g.brand);sv('g-model',g.model);sv('g-position',g.position);
  sv('g-size',g.size);sv('g-buy-date',g.buyDate);sv('g-buy-price',g.buyPrice);
  sv('g-sell-date',g.sellDate);sv('g-sell-price',g.sellPrice||''  );
  sv('g-pros',g.pros);sv('g-cons',g.cons);sv('g-note',g.note);
  document.querySelectorAll('#g-stars-row .g-star').forEach((s,i)=>s.classList.toggle('on',i<_modalStars));
  const preview=document.getElementById('g-img-preview');
  if(preview)preview.innerHTML=currentImgs.map((img,i)=>`
    <div class="g-img-preview-item">
      <img src="${img}" class="g-img-preview-img">
      <button class="g-img-del" onclick="removeGImg(${i})">✕</button>
    </div>`).join('');
  const delWrap=document.getElementById('g-del-wrap');if(delWrap)delWrap.style.display='';
  openGDrawer('g-edit-drawer');
}

function removeGImg(idx){
  currentImgs.splice(idx,1);
  const preview=document.getElementById('g-img-preview');
  if(preview)preview.innerHTML=currentImgs.map((img,i)=>`
    <div class="g-img-preview-item">
      <img src="${img}" class="g-img-preview-img">
      <button class="g-img-del" onclick="removeGImg(${i})">✕</button>
    </div>`).join('');
}

// ══ DETAIL ══
let _detailId=null;
function openGDetail(id){
  const g=db.gloves.find(x=>x.id===id);if(!g)return;
  _detailId=id;
  const title=document.getElementById('g-detail-title');
  if(title)title.textContent=(g.brand||'—')+' '+( g.model||''  );
  const body=document.getElementById('g-detail-body');
  if(!body)return;
  const sold=g.sellDate&&g.sellPrice;
  const pnl=sold?(+g.sellPrice)-(+g.buyPrice):null;
  const stars=g.stars?'★'.repeat(g.stars)+'☆'.repeat(5-g.stars):'';
  body.innerHTML=`
    ${(g.images||[]).length>0?`
    <div class="g-img-gallery" style="margin-bottom:16px">
      ${g.images.map((img,i)=>`<img src="${img}" class="g-img-thumb" onclick="openLightbox(${i},'${g.id}')">`).join('')}
    </div>`:''}
    <div class="g-detail-grid" style="margin-bottom:16px">
      <div class="g-detail-section">
        <div class="g-detail-label">品牌</div>
        <div class="g-detail-val">${g.brand||'—'}</div>
      </div>
      <div class="g-detail-section">
        <div class="g-detail-label">型號</div>
        <div class="g-detail-val">${g.model||'—'}</div>
      </div>
      <div class="g-detail-section">
        <div class="g-detail-label">守備位置</div>
        <div class="g-detail-val">${g.position||'—'}</div>
      </div>
      <div class="g-detail-section">
        <div class="g-detail-label">尺寸</div>
        <div class="g-detail-val">${g.size||'—'}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;padding:14px;background:#f8f9fa;border-radius:10px">
      <div style="text-align:center">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px">買入價格</div>
        <div style="font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#dc2626">$${(+g.buyPrice||0).toLocaleString()}</div>
        <div style="font-size:10px;color:#9ca3af">${g.buyDate||''}</div>
      </div>
      ${sold?`
      <div style="text-align:center">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px">賣出價格</div>
        <div style="font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#16a34a">$${(+g.sellPrice).toLocaleString()}</div>
        <div style="font-size:10px;color:#9ca3af">${g.sellDate}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px">損益</div>
        <div style="font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${pnl>=0?'#dc2626':'#16a34a'}">${pnl>=0?'+':''} $${Math.abs(pnl).toLocaleString()}</div>
      </div>`:''}
    </div>
    ${stars?`<div style="margin-bottom:14px;font-size:18px;color:#f59e0b">${stars}</div>`:''}
    ${g.pros?`<div class="g-detail-section"><div class="g-detail-label">優點</div><div class="g-detail-val" style="white-space:pre-wrap">${g.pros}</div></div>`:''  }

function updateStats(){

  const returned=sold.reduce((s,g)=>s+(+g.sellPrice||0),0);
  const pnl=returned-sold.reduce((s,g)=>s+(+g.buyPrice||0),0);
  const el=id=>document.getElementById(id);
  el('s-total').textContent=all.length;
  el('s-hold').textContent=hold.length;
  el('s-invested').textContent='$'+invested.toLocaleString();
  el('s-returned').textContent='$'+returned.toLocaleString();
  const pnlEl=el('s-pnl');
  pnlEl.textContent=(pnl>=0?'+':'')+pnl.toLocaleString();
  pnlEl.className='stat-val '+(pnl>0?'green':pnl<0?'red':'');
  // 儲存空間
  const storageEl=el('s-storage');
  if(storageEl){
    const bytes=new Blob([localStorage.getItem(DB_KEY)||'']).size;
    const kb=Math.round(bytes/1024);
    const pct=Math.round(kb/5120*100);
    storageEl.textContent=kb+'KB / 5MB';

  }
}

function showSyncStatus(msg){

async function ghPull(){
  if(!_syncEnabled)return false;
  try{
    const r=await fetch(GH_API+'?t='+Date.now());
    if(!r.ok){if(r.status===404)return false;throw new Error('Pull '+r.status);}
    const j=await r.json();
    _ghSha=j.sha;
    const b64=j.content.replace(/\n/g,'');
    const binStr=atob(b64);
    const bytes=new Uint8Array(binStr.length);
    for(let i=0;i<binStr.length;i++)bytes[i]=binStr.charCodeAt(i);
    const remote=JSON.parse(new TextDecoder().decode(bytes));
    const localTs=db._ts||0;
    const remoteTs=remote._ts||0;
    console.log('glove Pull: 本地ts='+localTs+' 遠端ts='+remoteTs);
    if(remoteTs>=localTs){
      // 保護本地較多的資料
      if((db.gloves||[]).length>(remote.gloves||[]).length)remote.gloves=db.gloves;
      db=remote;
      localStorage.setItem(DB_KEY,JSON.stringify(db));
      showSyncStatus('☁️ 已從雲端同步');
      console.log('✅ glove Pull 成功');
      return true;
    }
    console.log('本地資料較新，保留本地');
    return false;
  }catch(e){console.warn('Pull失敗:',e.message);return false;}
}

async function ghPush(){
  if(!_syncEnabled)return;
  try{
    db._ts=Date.now();
    localStorage.setItem(DB_KEY,JSON.stringify(db));
    const jsonStr=JSON.stringify(db,null,2);
    const encoder=new TextEncoder();
    const bytes=encoder.encode(jsonStr);
    const binStr=Array.from(bytes,b=>String.fromCharCode(b)).join('');
    const encoded=btoa(binStr);
    if(!_ghSha){
      try{const chk=await fetch(GH_API);if(chk.ok){const cj=await chk.json();_ghSha=cj.sha;}}catch(e){}
    }
    const body={message:'glove-sync:'+Date.now(),content:encoded};
    if(_ghSha)body.sha=_ghSha;
    const r=await fetch(GH_API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){
      const e=await r.json();
      if(e.message&&e.message.includes('does not match')){
        try{
          const chk2=await fetch(GH_API+'?t='+Date.now());
          if(chk2.ok){const cj2=await chk2.json();_ghSha=cj2.sha;}
          const body2={message:'glove-retry:'+Date.now(),content:encoded,sha:_ghSha};
          const r2=await fetch(GH_API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body2)});
          if(r2.ok){const j2=await r2.json();_ghSha=j2.content.sha;showSyncStatus('✅ 已同步至雲端');return;}
        }catch(e2){}
      }
      throw new Error(e.message);
    }
    const j=await r.json();
    _ghSha=j.content.sha;
    showSyncStatus('✅ 已同步至雲端');
  }catch(e){showSyncStatus('⚠️ 同步失敗');console.warn('Push失敗:',e.message);}
}

function schedulePush(){
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(ghPush,3000);
}

// 離開頁面立即 Push；切回頁面強制 Pull
document.addEventListener('visibilitychange',async function(){
  if(document.visibilityState==='hidden'){
    clearTimeout(_syncTimer);
    ghPush();
  }
  if(document.visibilityState==='visible'){
    if(!_syncEnabled)return;
    _syncEnabled=false;
    try{
      const r=await fetch(GH_API+'?t='+Date.now());
      if(r.ok){
        const j=await r.json();
        _ghSha=j.sha;
        const b64=j.content.replace(/\n/g,'');
        const binStr=atob(b64);
        const bytes=new Uint8Array(binStr.length);
        for(let i=0;i<binStr.length;i++)bytes[i]=binStr.charCodeAt(i);
        const remote=JSON.parse(new TextDecoder().decode(bytes));
        const remoteTs=remote._ts||0;
        const localTs=db._ts||0;
        if(remoteTs>=localTs){
          if((db.gloves||[]).length>(remote.gloves||[]).length)remote.gloves=db.gloves;
          db=remote;
          localStorage.setItem(DB_KEY,JSON.stringify(db));
          renderAllPages();
          showSyncStatus('☁️ 已從雲端同步');
        }
      }
    }catch(e){console.warn('visibilitychange Pull失敗:',e.message);}
    _syncEnabled=true;
  }
});

  // 讀取原始檔案
  const b64=await new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>{
      // 去掉 data:image/xxx;base64, 前綴
      resolve(e.target.result.split(',')[1]);
    };
    r.readAsDataURL(file);
  });

  // 產生唯一檔名
  const ext=file.name.split('.').pop().toLowerCase()||'jpg';
  const fname=`glove-images/${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;

  // 先取得現有 sha（如果存在）
  let sha='';
  try{
    const chk=await fetch(`${WORKER}/${fname}`);
    if(chk.ok){const j=await chk.json();sha=j.sha||'';}
  }catch(e){}

  // PUT 到 GitHub
  const body={message:`glove-img:${Date.now()}`,content:b64};
  if(sha)body.sha=sha;
  const r=await fetch(`${WORKER}/${fname}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok){
    const e=await r.json();
    throw new Error(e.message||'上傳失敗');
  }
  const j=await r.json();
  // 回傳 GitHub raw URL
  return `https://raw.githubusercontent.com/manny76528-star/stock-dashboard/main/${fname}`;
}

async function handleImgUpload(e){
  const files=Array.from(e.target.files);
  const remaining=8-currentImgs.length;
  if(remaining<=0){toast('⚠️ 最多 8 張圖片');e.target.value='';return;}

  const btn=document.querySelector('.img-upload-zone');
  if(btn){btn.style.opacity='.5';btn.style.pointerEvents='none';}
  toast('📤 上傳中，請稍候...');

  const toUpload=files.slice(0,remaining);
  let success=0;
  for(const f of toUpload){
    try{
      const url=await uploadImgToGitHub(f);
      currentImgs.push(url);
      renderImgPreview();
      success++;
    }catch(err){
      toast(`⚠️ 第${success+1}張上傳失敗：${err.message}`);
    }
  }
  if(btn){btn.style.opacity='';btn.style.pointerEvents='';}
  if(success>0)toast(`✅ 已上傳 ${success} 張圖片到雲端！`);
  e.target.value='';
}
function renderImgPreview(){
  const wrap=document.getElementById('g-img-preview');if(!wrap)return;
  if(!currentImgs.length){wrap.innerHTML='';return;}
  wrap.innerHTML=currentImgs.map((img,i)=>`
    <div class="img-thumb" style="${i===0?'border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,160,32,.4)':''}">
      <img src="${img}" alt="">
      <button class="img-thumb-del" onclick="removeImg(${i})">×</button>
      <button onclick="setCover(${i})" title="設為封面" style="
        position:absolute;bottom:3px;right:3px;
        width:18px;height:18px;border-radius:50%;
        background:${i===0?'var(--accent)':'rgba(0,0,0,.6)'};
        color:${i===0?'#000':'#fff'};
        border:none;font-size:10px;cursor:pointer;
        display:flex;align-items:center;justify-content:center;line-height:1;
      ">⭐</button>
      ${i===0?`<div style="position:absolute;top:3px;left:3px;background:var(--accent);color:#000;font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.5px">封面</div>`:''}
    </div>`).join('');
}
function setCover(i){
  if(i===0)return;
  // 把第 i 張移到最前面
  const [img]=currentImgs.splice(i,1);
  currentImgs.unshift(img);
  renderImgPreview();
  toast('✅ 已設為封面');
}
function removeImg(i){currentImgs.splice(i,1);renderImgPreview();}
function compress(file,maxW,q){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',q));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// 重新壓縮圖片陣列（base64 → canvas → 更小的 base64）
function recompressImgs(imgs){
  if(!imgs||!imgs.length)return Promise.resolve([]);
  return Promise.all(imgs.map(b64=>{
    return new Promise(resolve=>{
      if(!b64.startsWith('data:'))return resolve(b64);
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height;
        const maxW=600; // 更積極壓縮
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',0.55));
      };
      img.onerror=()=>resolve(b64);
      img.src=b64;
    });
  }));
}

// 一鍵重新壓縮所有手套的圖片
async function recompressAll(){
  const btn=document.getElementById('recomp-btn');
  if(btn){btn.disabled=true;btn.textContent='壓縮中...';}
  toast('🗜 正在壓縮所有圖片，請稍候...');

  for(let i=0;i<db.gloves.length;i++){
    const g=db.gloves[i];
    if(g.images&&g.images.length){
      db.gloves[i].images=await recompressImgs(g.images);
    }
  }
  try{
    save();
    renderAllPages();
    const bytes=new Blob([localStorage.getItem(DB_KEY)||'']).size;
    const kb=Math.round(bytes/1024);
    toast(`✅ 壓縮完成！目前使用 ${kb}KB / 5120KB`);
  }catch(e){
    toast('⚠️ 壓縮後仍超出空間，請手動刪除部分圖片');
  }
  if(btn){btn.disabled=false;btn.textContent='🗜 重新壓縮所有圖片';}
}
function openLightbox(idx,gid){
  const g=db.gloves.find(x=>x.id===gid);if(!g)return;
  lbImgs=g.images||[];lbIdx=idx;
  document.getElementById('lightbox').classList.add('open');
  updateLb();
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function updateLb(){
  document.getElementById('lb-img').src=lbImgs[lbIdx];
  document.getElementById('lb-counter').textContent=(lbIdx+1)+'/'+lbImgs.length;
}
function lbPrev(){lbIdx=(lbIdx-1+lbImgs.length)%lbImgs.length;updateLb();}
function lbNext(){lbIdx=(lbIdx+1)%lbImgs.length;updateLb();}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p.length===3?p[0]+'/'+p[1]+'/'+p[2]:d;}
let _tt=null;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2800);
}

// ESC 關閉
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('lightbox').classList.contains('open'))closeLightbox();
    else if(document.getElementById('detail-modal').classList.contains('open'))closeDetail();
    else closeModal();
  }
  if(e.key==='ArrowLeft'&&document.getElementById('lightbox').classList.contains('open'))lbPrev();
  if(e.key==='ArrowRight'&&document.getElementById('lightbox').classList.contains('open'))lbNext();
});

async function manualSync(){
  showSyncStatus('🔄 同步中...');
  _ghSha='';
  const updated=await ghPull();
  if(updated)renderAllPages();
  await ghPush();
  showSyncStatus('✅ 同步完成');
}

// ══════════════════════════
// INIT — 啟動先 Pull
// ══════════════════════════
(async()=>{
  _syncEnabled=false;
  showSyncStatus('🔄 載入中...');
  try{
    const r=await fetch(GH_API+'?t='+Date.now());
    if(r.ok){
      const j=await r.json();
      _ghSha=j.sha;
      const b64=j.content.replace(/\n/g,'');
      const binStr=atob(b64);
      const bytes=new Uint8Array(binStr.length);
      for(let i=0;i<binStr.length;i++)bytes[i]=binStr.charCodeAt(i);
      const remote=JSON.parse(new TextDecoder().decode(bytes));
      const remoteTs=remote._ts||0;
      const localTs=db._ts||0;
      console.log('glove 啟動Pull: 本地ts='+localTs+' 遠端ts='+remoteTs);
      if(remoteTs>=localTs||(remote.gloves||[]).length>0&&(db.gloves||[]).length===0){
        if((db.gloves||[]).length>(remote.gloves||[]).length)remote.gloves=db.gloves;
        db=remote;
        localStorage.setItem(DB_KEY,JSON.stringify(db));
        showSyncStatus('☁️ 已從雲端同步');
      }
    }
  }catch(e){console.warn('啟動Pull失敗:',e.message);}
  _syncEnabled=true;
  renderAllPages();
})();
