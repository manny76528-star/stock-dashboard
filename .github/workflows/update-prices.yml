name: Update Stock Prices

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save prices
        run: |
          python3 - << 'EOF'
          import urllib.request, json, datetime, re

          prices = {}

          # ── TWSE 上市 ──
          try:
              url = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL'
              req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0','Accept':'application/json'})
              with urllib.request.urlopen(req, timeout=20) as r:
                  data = json.loads(r.read().decode('utf-8'))
              for item in data:
                  code = str(item.get('Code') or item.get('證券代號') or '').strip()
                  price_raw = str(item.get('ClosingPrice') or item.get('收盤價') or '')
                  chg_raw = str(item.get('Change') or item.get('漲跌價差') or '0')
                  try:
                      price = float(price_raw.replace(',',''))
                      chg = float(re.sub(r'[^\d.\-]','',chg_raw) or '0')
                      if code and price > 0:
                          prev = price - chg
                          prices[code] = {'price': price, 'change': round(chg,2),
                              'changePct': round(chg/prev*100,2) if prev > 0 else 0}
                  except: pass
              print(f'TWSE: {len(prices)} stocks')
              # Print sample
              sample = list(prices.items())[:3]
              for k,v in sample:
                  print(f'  {k}: {v}')
          except Exception as e:
              print(f'TWSE error: {e}')

          # ── TPEx 上櫃 ──
          before = len(prices)
          try:
              url2 = 'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes'
              req2 = urllib.request.Request(url2, headers={'User-Agent':'Mozilla/5.0','Accept':'application/json'})
              with urllib.request.urlopen(req2, timeout=20) as r2:
                  data2 = json.loads(r2.read().decode('utf-8'))
              for item in data2:
                  code = str(item.get('代號') or item.get('Code') or item.get('SecuritiesCompanyCode') or '').strip().upper()
                  price_raw = str(item.get('收盤') or item.get('Close') or item.get('ClosingPrice') or '')
                  chg_raw = str(item.get('漲跌') or item.get('Change') or '0')
                  try:
                      price = float(price_raw.replace(',',''))
                      is_neg = '▼' in chg_raw or chg_raw.strip().startswith('-')
                      chg_val = float(re.sub(r'[^\d.]','', chg_raw) or '0')
                      chg = -chg_val if is_neg else chg_val
                      if code and price > 0:
                          prev = price - chg
                          prices[code] = {'price': price, 'change': round(chg,2),
                              'changePct': round(chg/prev*100,2) if prev > 0 else 0}
                  except: pass
              print(f'TPEx: +{len(prices)-before} stocks, total: {len(prices)}')
              # Check specific codes
              for check in ['00985B','00864B','00981B','00988A','9933','2330','0056','0050']:
                  if check in prices:
                      print(f'  ✓ {check}: {prices[check]}')
                  else:
                      print(f'  ✗ {check}: NOT FOUND')
          except Exception as e:
              print(f'TPEx error: {e}')

          # ── Write output ──
          output = {
              'updated': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'count': len(prices),
              'prices': prices
          }
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)
          print(f'Written prices.json: {len(prices)} stocks')
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "prices: $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
