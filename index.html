<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#0f2744 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Sans TC',sans-serif;padding:24px;}
.logo{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:32px;font-weight:900;color:#fff;margin-bottom:4px;letter-spacing:1px;}
.sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:48px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;width:100%;max-width:620px;}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:32px 28px;cursor:pointer;transition:all .25s;text-decoration:none;display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);opacity:0;transition:opacity .25s;}
.card:hover{border-color:rgba(255,255,255,.3);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.3);}
.card:hover::before{opacity:1;}
.card-icon{font-size:36px;}
.card-title{font-size:18px;font-weight:700;color:#fff;}
.card-desc{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6;}
.card-arrow{position:absolute;bottom:24px;right:24px;font-size:18px;color:rgba(255,255,255,.3);transition:all .25s;}
.card:hover .card-arrow{color:rgba(255,255,255,.8);transform:translateX(4px);}
.card-badge{display:inline-block;background:rgba(96,165,250,.2);color:#93c5fd;border:1px solid rgba(96,165,250,.3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;margin-top:4px;align-self:flex-start;}
.card-badge.new{background:rgba(34,197,94,.2);color:#86efac;border-color:rgba(34,197,94,.3);}
.ver{margin-top:40px;font-size:11px;color:rgba(255,255,255,.2);}
</style>
</head>
<body>
<div class="logo">Management System</div>
<div class="title">📊 管理主目錄</div>
<div class="sub">選擇要進入的系統</div>

<div class="cards">
  <a href="dashboard.html" class="card">
    <div class="card-icon">📈</div>
    <div>
      <div class="card-title">資產損益表</div>
      <div class="card-desc">投資標的、信貸管理、現金帳戶、股息記錄、資產總覽</div>
    </div>
    <div class="card-badge">個人財務</div>
    <div class="card-arrow">→</div>
  </a>

  <a href="inventory.html" class="card">
    <div class="card-icon">🗂️</div>
    <div>
      <div class="card-title">進銷存系統</div>
      <div class="card-desc">客戶管理、開單記帳、序號查詢、應收帳款、業績分析</div>
    </div>
    <div class="card-badge new">業務記帳</div>
    <div class="card-arrow">→</div>
  </a>
</div>

<div class="ver">v1.0 · 2026</div>
</body>
</html>
